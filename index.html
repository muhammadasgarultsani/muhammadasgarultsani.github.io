<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendataan Kematian - Kantor Camat Suralaga</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Pendataan Kematian di Kantor Camat Suralaga</h1>
    </header>
    <main>
        <section>
            <h2>Form Pendataan Kematian</h2>
            <form>
                <label for="nama">Nama:</label>
                <input type="text" id="nama" name="nama" required>
                <label for="tanggalKematian">Tanggal Kematian:</label>
                <input type="date" id="tanggalKematian" name="tanggalKematian" required>
                <label for="sebabKematian">Sebab Kematian:</label>
                <input type="text" id="sebabKematian" name="sebabKematian" required>
                <button type="submit">Kirim</button>
            </form>
        </section>
        <section id="death-count">
            <h2>Jumlah Kematian Tercatat</h2>
            <p>Bulan: <input type="text" id="month" placeholder="Bulan (1-12)"></p>
            <p>Tahun: <input type="text" id="year" placeholder="Tahun"></p>
            <button onclick="countDeaths()">Hitung</button>
            <p id="result"></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Kantor Camat Suralaga</p>
    </footer>
    <script>
        function countDeaths() {
            const month = document.getElementById('month').value;
            const year = document.getElementById('year').value;
            // Simulasi data kematian
            const deaths = {
                '2026': { '1': 5, '2': 3, '3': 4 }, // Data contoh
                '2025': { '1': 2, '2': 6, '3': 1 }
            };
            const count = deaths[year] ? deaths[year][month] || 0 : 0;
            document.getElementById('result').innerText = `Jumlah kematian pada ${month}/${year}: ${count}`;
        }
    </script>
</body>
</html>
